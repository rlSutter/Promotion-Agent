services:
  promotion-agent:
    build: .
    container_name: promotion-agent
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - SUBSTACK_URL=${SUBSTACK_URL}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CHECK_INTERVAL_MINUTES=${CHECK_INTERVAL_MINUTES:-60}
      # DB and dashboard JSON live in /app/data so one volume works (avoids "unable to open database file" when host file doesn't exist)
      - PROMOTION_AGENT_DB=/app/data/promotion_agent.db
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/stats"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10s
